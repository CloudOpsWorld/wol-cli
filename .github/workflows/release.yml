name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  version-and-release:
    name: Version, Tag & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get latest tag
        id: get-latest-tag
        run: |
          # Get the latest semver tag
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Determine version bump
        id: determine-bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUMP="${{ inputs.bump }}"
          else
            # Auto-detect from commit messages
            COMMITS=$(git log ${{ steps.get-latest-tag.outputs.latest_tag }}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

            if echo "$COMMITS" | grep -qiE "^(breaking|major|!:)"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^(feat|feature|minor)"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump: $BUMP"

      - name: Calculate new version
        id: new-version
        run: |
          LATEST="${{ steps.get-latest-tag.outputs.latest_tag }}"
          BUMP="${{ steps.determine-bump.outputs.bump }}"

          # Remove 'v' prefix
          VERSION="${LATEST#v}"

          # Split into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Bump version
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

      - name: Check if release needed
        id: check-release
        run: |
          NEW_TAG="${{ steps.new-version.outputs.tag }}"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping release"
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "Will create release $NEW_TAG"
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pyproject.toml
        if: steps.check-release.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.new-version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml to version $VERSION"
          cat pyproject.toml | grep "^version"

      - name: Update version in __init__.py
        if: steps.check-release.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.new-version.outputs.version }}"
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION\"/" src/wol_cli/__init__.py
          echo "Updated __init__.py to version $VERSION"
          cat src/wol_cli/__init__.py | grep "__version__"

      - name: Commit version changes
        if: steps.check-release.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.new-version.outputs.version }}"
          TAG="${{ steps.new-version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml src/wol_cli/__init__.py
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD --tags

    outputs:
      version: ${{ steps.new-version.outputs.version }}
      tag: ${{ steps.new-version.outputs.tag }}
      needed: ${{ steps.check-release.outputs.needed }}

  build:
    name: Build artifacts
    needs: version-and-release
    if: needs.version-and-release.outputs.needed == 'true'
    uses: ./.github/workflows/build.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-and-release, build]
    if: needs.version-and-release.outputs.needed == 'true'

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: wol-linux-amd64
          path: artifacts/linux/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: wol-windows-amd64.exe
          path: artifacts/windows/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: wol-macos-amd64
          path: artifacts/macos/

      - name: Download Python package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/package/

      - name: Prepare release assets
        run: |
          mv artifacts/linux/wol artifacts/wol-linux-amd64
          mv artifacts/windows/wol.exe artifacts/wol-windows-amd64.exe
          mv artifacts/macos/wol artifacts/wol-macos-amd64
          chmod +x artifacts/wol-linux-amd64 artifacts/wol-macos-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-and-release.outputs.tag }}
          name: Release ${{ needs.version-and-release.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/wol-linux-amd64
            artifacts/wol-windows-amd64.exe
            artifacts/wol-macos-amd64
            artifacts/package/*.whl
            artifacts/package/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version-and-release, build]
    if: needs.version-and-release.outputs.needed == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/wol-cli

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
