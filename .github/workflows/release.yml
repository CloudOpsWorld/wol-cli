name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: wol-linux-amd64
            binary_path: dist/wol
          - os: windows-latest
            asset_name: wol-windows-amd64.exe
            binary_path: dist/wol.exe
          - os: macos-latest
            asset_name: wol-macos-amd64
            binary_path: dist/wol

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build binary
        run: |
          pyinstaller --onefile --name wol --clean src/wol_cli/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.binary_path }}

  build-package:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run tests
        run: pytest -v

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-package, test]
    environment:
      name: pypi
      url: https://pypi.org/p/wol-cli

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, test]

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: wol-linux-amd64
          path: artifacts/linux/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: wol-windows-amd64.exe
          path: artifacts/windows/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: wol-macos-amd64
          path: artifacts/macos/

      - name: Download Python package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/package/

      - name: Prepare release assets
        run: |
          mv artifacts/linux/wol artifacts/wol-linux-amd64
          mv artifacts/windows/wol.exe artifacts/wol-windows-amd64.exe
          mv artifacts/macos/wol artifacts/wol-macos-amd64
          chmod +x artifacts/wol-linux-amd64 artifacts/wol-macos-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wol-linux-amd64
            artifacts/wol-windows-amd64.exe
            artifacts/wol-macos-amd64
            artifacts/package/*.whl
            artifacts/package/*.tar.gz
