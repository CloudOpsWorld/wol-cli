name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from tag/release
        id: get-version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: Get version from pyproject.toml
        id: pyproject-version
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "pyproject_version=$PYPROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "pyproject.toml version: $PYPROJECT_VERSION"

      - name: Get version from __init__.py
        id: init-version
        run: |
          INIT_VERSION=$(python -c "from src.wol_cli import __version__; print(__version__)")
          echo "init_version=$INIT_VERSION" >> $GITHUB_OUTPUT
          echo "__init__.py version: $INIT_VERSION"

      - name: Validate all versions match
        run: |
          TAG_VERSION="${{ steps.get-version.outputs.version }}"
          PYPROJECT_VERSION="${{ steps.pyproject-version.outputs.pyproject_version }}"
          INIT_VERSION="${{ steps.init-version.outputs.init_version }}"

          echo "=== Version Check ==="
          echo "Tag version:         $TAG_VERSION"
          echo "pyproject.toml:      $PYPROJECT_VERSION"
          echo "__init__.py:         $INIT_VERSION"
          echo "====================="

          ERRORS=0

          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject.toml version ($PYPROJECT_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          if [[ "$TAG_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) != __init__.py version ($INIT_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "Please ensure all versions match before releasing:"
            echo "  1. pyproject.toml: version = \"$TAG_VERSION\""
            echo "  2. src/wol_cli/__init__.py: __version__ = \"$TAG_VERSION\""
            exit 1
          fi

          echo "All versions match: $TAG_VERSION"

  build:
    name: Build artifacts
    needs: validate-version
    uses: ./.github/workflows/build.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build]
    if: github.event_name == 'push'

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: wol-linux-amd64
          path: artifacts/linux/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: wol-windows-amd64.exe
          path: artifacts/windows/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: wol-macos-amd64
          path: artifacts/macos/

      - name: Download Python package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/package/

      - name: Prepare release assets
        run: |
          mv artifacts/linux/wol artifacts/wol-linux-amd64
          mv artifacts/windows/wol.exe artifacts/wol-windows-amd64.exe
          mv artifacts/macos/wol artifacts/wol-macos-amd64
          chmod +x artifacts/wol-linux-amd64 artifacts/wol-macos-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wol-linux-amd64
            artifacts/wol-windows-amd64.exe
            artifacts/wol-macos-amd64
            artifacts/package/*.whl
            artifacts/package/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-version, build]
    environment:
      name: pypi
      url: https://pypi.org/p/wol-cli

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
