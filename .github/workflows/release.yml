name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
      should_release: ${{ steps.check-tag.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          RAW_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          # Strip 'v' prefix if present to normalize
          VERSION="${RAW_VERSION#v}"
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tag: $TAG"

      - name: Validate __init__.py matches
        run: |
          PYPROJECT_VERSION="${{ steps.get-version.outputs.version }}"
          INIT_VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from wol_cli import __version__; print(__version__)")

          echo "pyproject.toml: $PYPROJECT_VERSION"
          echo "__init__.py:    $INIT_VERSION"

          if [[ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]]; then
            echo "::error::Version mismatch! pyproject.toml ($PYPROJECT_VERSION) != __init__.py ($INIT_VERSION)"
            echo "Please ensure both files have the same version before releasing."
            exit 1
          fi

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG="${{ steps.get-version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist, will create release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"

  build:
    name: Build artifacts
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/build.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, create-tag, build]
    if: needs.check-version.outputs.should_release == 'true'

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: wol-linux-amd64
          path: artifacts/linux/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: wol-windows-amd64.exe
          path: artifacts/windows/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: wol-macos-amd64
          path: artifacts/macos/

      - name: Download Python package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: artifacts/package/

      - name: Prepare release assets
        run: |
          mv artifacts/linux/wol artifacts/wol-linux-amd64
          mv artifacts/windows/wol.exe artifacts/wol-windows-amd64.exe
          mv artifacts/macos/wol artifacts/wol-macos-amd64
          chmod +x artifacts/wol-linux-amd64 artifacts/wol-macos-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Release ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/wol-linux-amd64
            artifacts/wol-windows-amd64.exe
            artifacts/wol-macos-amd64
            artifacts/package/*.whl
            artifacts/package/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [check-version, create-tag, build]
    if: needs.check-version.outputs.should_release == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/wol-cli

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
